# Welcome to Beautiful Jekyll!
# This config file is meant for settings that affect your entire website. When you first
# set up your website you should go through all these settings and edit them, but after
# the initial set up you won't need to come back to this file often.

# url is the full website URL
# baseurl is the website's URL without the hostname

# If you are building a simple GitHub user page (http://username.github.io) then use these settings:
#url: "http://majidnisar.github.io"
url: "https://majidnisar.com"
baseurl: ""

# If you are building a GitHub project page then use these settings:
#url: "http://MAJIDNISAR.github.io/projectname"
#baseurl: "/projectname"

# Of course don't forget to change the username and projectname to YOUR username and project

# Name of website
title: Majid Nisar.com

# Short description of your site
description: "Technology leadership for software, AI products, and systems of execution."

# --- List of links in the navigation bar --- #
# Menu structure optimized for clarity and conversion:
# - Home: Landing page
# - About: Personal background and credentials
# - Leadership: Operating model and executive approach (highlighted)
# - Case Studies: Proof of work and capabilities
# - Speaking: Speaking engagements and talks
# - Writing: Essays, newsletter, and educational content
# - Photography: Visual work from Kashmir and beyond
# - Work With Me: Primary CTA for paid engagements
# - Contact: Get in touch

navbar-links:
  Home: "/"
  About:
    - About Me: "aboutme"
    - CV / Resume: "cv"
    - Media Kit: "media-kit"
  Leadership: "leadership"
  Case Studies:
    - Case Studies: "case-studies"
    - Projects: "projects"
  Speaking: "speaking"
  Writing:
    - Writing: "writing"
    - Newsletter: "writing/newsletter"
    - Tutorials: "tutorials"
  Photography: "photography"
  Work With Me: "work-with-me"
  Contact: "contact"

# --- Logo --- #

# Image to show in the navigation bar - works best with a square image
# Remove this parameter if you don't want an image in the navbar
avatar: "/assets/img/avatar.jpg"

# By default, the image is cut into a circle. You can disable this behaviour by setting 'round-avatar: false'
round-avatar: true

# If you want to have an image logo in the top-left corner instead of having the title of the website,
# then specify the following parameter
title-img: "/assets/img/avatar.jpg"


