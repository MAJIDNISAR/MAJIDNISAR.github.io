<!-- Modern Search Overlay -->
<div class="search-overlay-modern" id="search-overlay">
  <div class="search-container-modern">
    <input 
      type="text" 
      class="search-input-modern" 
      id="search-input" 
      placeholder="Search articles, projects, and more..."
      autocomplete="off"
    >
    <button class="search-close" id="search-close" title="Close search">
      <i class="fas fa-times"></i>
    </button>
    <div class="search-results-modern" id="search-results"></div>
  </div>
</div>
