<!-- Newsletter Subscription Section -->
<section class="newsletter-section" id="newsletter">
  <div class="container">
    <h2>Stay Updated</h2>
    <p>Get the latest articles, tutorials, and insights delivered to your inbox.</p>
    
    <!-- Buttondown Integration -->
    <form 
      action="https://buttondown.email/api/emails/embed-subscribe/majidnisar" 
      method="post" 
      target="popupwindow" 
      onsubmit="window.open('https://buttondown.email/majidnisar', 'popupwindow')" 
      class="newsletter-form" 
      id="newsletter-form"
    >
      <input 
        type="email" 
        name="email" 
        class="newsletter-input" 
        placeholder="Enter your email address" 
        required
        aria-label="Email address"
      >
      <input type="hidden" value="1" name="embed"/>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-paper-plane"></i> Subscribe
      </button>
    </form>
    
    <p class="newsletter-note">
      <small>No spam, unsubscribe anytime. I respect your privacy.</small>
    </p>
  </div>
</section>
